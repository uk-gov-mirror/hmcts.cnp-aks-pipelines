trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: AzureCLI@2
    name: DeleteImageFromACR
    displayName: 'Check and delete image from ACR'
    inputs:
      azureSubscription: 'azurerm-sandbox'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        #!/bin/bash
        
        # Enable debug mode
        set -x
        
        # Define the image to delete
        IMAGE="hmctssbox.azurecr.io/crumble/recipe-backend:pr-1266-5b225da-20260216130151"
        
        echo "=========================================="
        echo "ACR Image Deletion Process with Debugging"
        echo "=========================================="
        echo "Target image: $IMAGE"
        echo ""
        
        # Parse the ACR image
        if [[ "$IMAGE" =~ ^([^/]+)\.azurecr\.io/(.+):(.+)$ ]]; then
          acr_name="${BASH_REMATCH[1]}"
          repo="${BASH_REMATCH[2]}"
          tag="${BASH_REMATCH[3]}"
          
          echo "🔍 ACR Name: $acr_name"
          echo "🔍 Repository: $repo"
          echo "🔍 Tag: $tag"
          echo ""
          
          # Check if repository exists
          echo "🔎 Step 1: Checking if repository exists..."
          if az acr repository show --name "$acr_name" --repository "$repo" --output none 2>/dev/null; then
            echo "✅ Repository exists"
            
            # Check if the specific tag exists BEFORE deletion
            echo ""
            echo "🔎 Step 2: Checking if tag exists BEFORE deletion..."
            tag_exists_before=$(az acr repository show-tags \
              --name "$acr_name" \
              --repository "$repo" \
              --query "contains([], '$tag')" \
              --output tsv 2>/dev/null)
            
            echo "Tag exists before deletion: $tag_exists_before"
            
            if [ "$tag_exists_before" == "true" ]; then
              echo "✅ Image found in ACR"
              echo ""
              
              # Get image digest before deletion
              echo "🔎 Step 3: Getting image digest..."
              digest=$(az acr repository show-manifests \
                --name "$acr_name" \
                --repository "$repo" \
                --query "[?tags[?contains(@, '$tag')]].digest" \
                --output tsv 2>/dev/null)
              
              echo "Image digest: $digest"
              echo ""
              
              # Try multiple deletion methods
              echo "🗑️  Step 4: Attempting deletion..."
              
              # Method 1: Delete by tag
              echo "Method 1: Deleting by tag..."
              delete_output=$(az acr repository delete \
                --name "$acr_name" \
                --image "${repo}:${tag}" \
                --yes \
                --output json 2>&1)
              
              delete_exit_code=$?
              echo "Delete command exit code: $delete_exit_code"
              echo "Delete command output: $delete_output"
              echo ""
              
              # Method 2: If digest is available, try deleting by digest
              if [ -n "$digest" ] && [ "$digest" != "null" ]; then
                echo "Method 2: Also trying to delete by digest (if still exists)..."
                az acr repository delete \
                  --name "$acr_name" \
                  --image "${repo}@${digest}" \
                  --yes \
                  --output json 2>&1 || true
                echo ""
              fi
              
              # Wait a moment for deletion to propagate
              echo "⏳ Waiting 5 seconds for deletion to propagate..."
              sleep 5
              
              # Verify deletion using multiple methods
              echo ""
              echo "🔎 Step 5: Verifying deletion..."
              
              # Verification Method 1: Check tags
              echo "Verification Method 1: Checking if tag still exists..."
              tag_exists_after=$(az acr repository show-tags \
                --name "$acr_name" \
                --repository "$repo" \
                --query "contains([], '$tag')" \
                --output tsv 2>/dev/null)
              
              echo "Tag exists after deletion: $tag_exists_after"
              
              # Verification Method 2: Try to get manifest by digest
              if [ -n "$digest" ] && [ "$digest" != "null" ]; then
                echo ""
                echo "Verification Method 2: Checking if digest still exists..."
                manifest_exists=$(az acr repository show-manifests \
                  --name "$acr_name" \
                  --repository "$repo" \
                  --query "[?digest=='$digest']" \
                  --output tsv 2>/dev/null | wc -l)
                
                echo "Manifest entries with digest: $manifest_exists"
              fi
              
              # Verification Method 3: List all remaining tags
              echo ""
              echo "Verification Method 3: Listing all remaining tags..."
              remaining_tags=$(az acr repository show-tags \
                --name "$acr_name" \
                --repository "$repo" \
                --output table 2>/dev/null)
              
              echo "Remaining tags:"
              echo "$remaining_tags"
              
              # Determine if deletion was successful
              if [ "$tag_exists_after" == "true" ]; then
                echo ""
                echo "❌ ERROR: Image still exists after deletion attempt!"
                echo "Possible reasons:"
                echo "  1. Insufficient permissions to delete images"
                echo "  2. Image is being used by a running container"
                echo "  3. Image has retention policies preventing deletion"
                echo "  4. ACR is in a locked state"
                echo "  5. Network issues during deletion"
                echo ""
                
                # Check permissions
                echo "🔍 Checking permissions..."
                az acr repository show \
                  --name "$acr_name" \
                  --repository "$repo" \
                  --output none 2>&1 || echo "Permission check failed"
                
                # Check if ACR has soft delete enabled
                echo ""
                echo "🔍 Checking if soft delete is enabled..."
                az acr config soft-delete show \
                  --registry "$acr_name" \
                  --output table 2>/dev/null || echo "Soft delete status unknown"
                
                # Check for locks
                echo ""
                echo "🔍 Checking for locks on ACR..."
                az lock list \
                  --resource-group "$(az acr show --name $acr_name --query resourceGroup -o tsv 2>/dev/null)" \
                  --resource "$acr_name" \
                  --resource-type "Microsoft.ContainerRegistry/registries" \
                  --output table 2>/dev/null || echo "No locks found or unable to check"
                
                exit 1
              else
                echo ""
                echo "✅✅✅ IMAGE SUCCESSFULLY DELETED ✅✅✅"
                echo "   Image: $IMAGE"
                echo "   Status: REMOVED from Azure Container Registry"
                exit 0
              fi
            else
              echo "❌❌❌ IMAGE NOT FOUND ❌❌❌"
              echo "   Image: $IMAGE"
              echo "   Status: NOT AVAILABLE in Azure Container Registry"
              echo "   No action taken"
              exit 0
            fi
          else
            echo "❌ Repository does not exist"
            echo "❌❌❌ IMAGE NOT FOUND ❌❌❌"
            exit 0
          fi
        else
          echo "❌ Invalid image format: $IMAGE"
          exit 1
        fi
    displayName: 'Delete image with debugging'