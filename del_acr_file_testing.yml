trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: AzureCLI@2
    name: CheckImageInACR
    displayName: 'Check if specific image exists in ACR'
    inputs:
      azureSubscription: 'azurerm-prod'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        #!/bin/bash
        
        # Define the image to check
        IMAGE="hmctspublic.azurecr.io/azure-devops-agent:pr-46-b8ab9fa5-1770913754"
        
        echo "=========================================="
        echo "Checking if image exists in ACR"
        echo "=========================================="
        echo "Image: $IMAGE"
        echo ""
        
        # Parse the ACR image
        if [[ "$IMAGE" =~ ^([^/]+)\.azurecr\.io/(.+):(.+)$ ]]; then
          acr_name="${BASH_REMATCH[1]}"
          repo="${BASH_REMATCH[2]}"
          tag="${BASH_REMATCH[3]}"
          
          echo "🔍 ACR Name: $acr_name"
          echo "🔍 Repository: $repo"
          echo "🔍 Tag: $tag"
          echo ""
          
          echo "🔎 Checking image existence..."
          
          # Check if repository exists
          if az acr repository show --name "$acr_name" --repository "$repo" --output none 2>/dev/null; then
            echo "✅ Repository exists"
            
            # Check if the specific tag exists
            if az acr repository show-tags \
              --name "$acr_name" \
              --repository "$repo" \
              --query "contains([], '$tag')" \
              --output tsv 2>/dev/null | grep -q "true"; then
              
              echo ""
              echo "✅✅✅ IMAGE FOUND! ✅✅✅"
              echo "Image: $IMAGE"
              echo "Status: AVAILABLE in Azure Container Registry"
              
              # Get image digest
              digest=$(az acr repository show-manifests \
                --name "$acr_name" \
                --repository "$repo" \
                --query "[?tags[?contains(@, '$tag')]].digest" \
                --output tsv 2>/dev/null)
              
              echo "Digest: $digest"
              echo ""
              echo "✅ RESULT: IMAGE EXISTS"
              exit 0
            else
              echo ""
              echo "❌❌❌ IMAGE NOT FOUND ❌❌❌"
              echo "Image: $IMAGE"
              echo "Status: NOT AVAILABLE in Azure Container Registry"
              echo "Reason: Repository exists but tag '$tag' not found"
              
              # Show available tags
              echo ""
              echo "Available tags in repository '$repo':"
              az acr repository show-tags \
                --name "$acr_name" \
                --repository "$repo" \
                --output table | head -20
              
              echo ""
              echo "❌ RESULT: IMAGE NOT FOUND"
              exit 1
            fi
          else
            echo "❌ Repository does not exist"
            echo ""
            echo "❌❌❌ IMAGE NOT FOUND ❌❌❌"
            echo "Image: $IMAGE"
            echo "Status: REPOSITORY NOT FOUND in Azure Container Registry"
            echo "Reason: Repository '$repo' does not exist in ACR '$acr_name'"
            
            # List available repositories
            echo ""
            echo "Available repositories in ACR '$acr_name':"
            az acr repository list --name "$acr_name" --output table | head -20
            
            echo ""
            echo "❌ RESULT: IMAGE NOT FOUND"
            exit 1
          fi
        else
          echo "❌ Invalid image format: $IMAGE"
          echo "Expected format: acr-name.azurecr.io/repository:tag"
          exit 1
        fi
    displayName: 'Check image existence'