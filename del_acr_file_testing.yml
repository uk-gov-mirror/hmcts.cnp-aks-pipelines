trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: AzureCLI@2
  displayName: "Delete ACR images from del.txt"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -euo pipefail

      FILE="del.txt"

      if [ ! -f "$FILE" ]; then
        echo "ERROR: File $FILE not found in repo"
        exit 1
      fi

      echo "Reading deletion list from $FILE..."
      echo ""

      # Skip header and process file
      tail -n +2 "$FILE" | while read -r ACR_NAME IMAGE_NAME; do

        # Skip blank lines
        if [ -z "${ACR_NAME:-}" ] || [ -z "${IMAGE_NAME:-}" ]; then
          continue
        fi

        echo "----------------------------------------"
        echo "ACR Name   : $ACR_NAME"
        echo "Image/Tag  : $IMAGE_NAME"
        echo "Deleting..."

        az acr repository delete \
          --name "$ACR_NAME" \
          --image "$IMAGE_NAME" \
          --yes

        echo "Deleted: $ACR_NAME / $IMAGE_NAME"
        echo ""
      done

      echo "All deletions completed."