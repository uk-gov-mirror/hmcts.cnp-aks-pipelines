# File: azure-pipelines.yml
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Azure Service Connection for ACR
  azureServiceConnection: 'azurerm-prod'

steps:

# =============================
# Step 1: Checkout Repo
# =============================
- checkout: self
  displayName: "Checkout repository"

# =============================
# Step 2: Find del.txt
# =============================
- script: |
    set -euo pipefail

    echo "Searching for del.txt in repo..."
    DEL_FILE=$(find $(System.DefaultWorkingDirectory) -type f -name "del.txt" | head -n 1)

    if [[ -z "$DEL_FILE" ]]; then
        echo "ERROR: del.txt not found in repo!"
        exit 1
    fi

    echo "Found file: $DEL_FILE"
    echo "##vso[task.setvariable variable=DEL_FILE_PATH]$DEL_FILE"
  displayName: "Locate del.txt"

# =============================
# Step 3: Delete images from ACR
# =============================
- task: AzureCLI@2
  displayName: "Delete ACR images from del.txt"
  inputs:
    azureSubscription: $(azureServiceConnection)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      DEL_FILE="$DEL_FILE_PATH"

      echo "========================================"
      echo "Starting ACR Cleanup based on $DEL_FILE"
      echo "========================================"

      IMAGES_FOUND=0
      IMAGES_DELETED=0
      IMAGES_NOT_FOUND=0
      DELETE_FAILURES=0

      while IFS=$'\t' read -r ACR_NAME IMAGE_NAME; do
        # Skip header or empty lines
        [[ "$ACR_NAME" == "acr_name" || -z "$ACR_NAME" || -z "$IMAGE_NAME" ]] && continue

        # Split IMAGE_NAME into repo and tag
        REPO="${IMAGE_NAME%%:*}"
        TAG="${IMAGE_NAME##*:}"

        echo "Checking ACR: $ACR_NAME, Repo: $REPO, Tag: $TAG"

        if az acr repository show-tags --name "$ACR_NAME" --repository "$REPO" --output tsv | grep -Fxq "$TAG"; then
          echo "✅ Image found: $REPO:$TAG"
          ((IMAGES_FOUND++))

          # Delete the image
          if az acr repository delete --name "$ACR_NAME" --image "$REPO:$TAG" --yes; then
            echo "🗑️ Deleted $REPO:$TAG"
            ((IMAGES_DELETED++))
          else
            echo "❌ Failed to delete $REPO:$TAG"
            ((DELETE_FAILURES++))
          fi
        else
          echo "⚠️ Image not found: $REPO:$TAG"
          ((IMAGES_NOT_FOUND++))
        fi

      done < "$DEL_FILE"

      echo "========================================"
      echo "ACR Cleanup Summary"
      echo "Images Found     : $IMAGES_FOUND"
      echo "Images Deleted   : $IMAGES_DELETED"
      echo "Images Not Found : $IMAGES_NOT_FOUND"
      echo "Delete Failures  : $DELETE_FAILURES"
      echo "========================================"