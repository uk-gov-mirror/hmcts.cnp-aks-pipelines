trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: AzureCLI@2
  displayName: "Find del.txt and delete ACR images"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -euo pipefail

      echo "Searching for del.txt in repo..."

      FILE=$(find "$(System.DefaultWorkingDirectory)" -type f -name "del.txt" | head -n 1)

      if [ -z "$FILE" ]; then
        echo "No del.txt file found in the repo. Nothing to delete."
        exit 0
      fi

      echo "Found file: $FILE"
      echo "Reading deletion list..."
      echo ""

      # Skip header and process each line
      tail -n +2 "$FILE" | while read -r ACR_NAME IMAGE_NAME; do

        # Skip blank lines
        if [ -z "${ACR_NAME:-}" ] || [ -z "${IMAGE_NAME:-}" ]; then
          continue
        fi

        echo "----------------------------------------"
        echo "ACR Name   : $ACR_NAME"
        echo "Image/Tag  : $IMAGE_NAME"

        echo "Checking if image exists..."

        if az acr repository show \
          --name "$ACR_NAME" \
          --image "$IMAGE_NAME" >/dev/null 2>&1; then

          echo "Deleting image: $IMAGE_NAME from $ACR_NAME"

          az acr repository delete \
            --name "$ACR_NAME" \
            --image "$IMAGE_NAME" \
            --yes

          echo "Deleted: $ACR_NAME / $IMAGE_NAME"
        else
          echo "Image not found: $ACR_NAME / $IMAGE_NAME"
        fi

        echo ""
      done

      echo "ACR cleanup completed."