trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: AzureCLI@2
    name: CheckImagesInACR
    displayName: 'Check if images exist in ACR'
    inputs:
      azureSubscription: 'azurerm-prod'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        #!/bin/bash
        
        # Read the del.txt file
        DEL_FILE="del.txt"
        
        # Check if file exists
        if [ ! -f "$DEL_FILE" ]; then
          echo "Error: $DEL_FILE not found!"
          exit 1
        fi
        
        # Skip header line and process each line
        tail -n +2 "$DEL_FILE" | while IFS=$'\t' read -r acr_name image_name; do
          # Skip empty lines
          if [ -z "$acr_name" ] || [ -z "$image_name" ]; then
            continue
          fi
          
          # Trim whitespace
          acr_name=$(echo "$acr_name" | xargs)
          image_name=$(echo "$image_name" | xargs)
          
          echo "=========================================="
          echo "Checking: $acr_name / $image_name"
          echo "=========================================="
          
          # Split image_name into repo and tag
          IFS=':' read -r repo tag <<< "$image_name"
          
          if [ -z "$repo" ] || [ -z "$tag" ]; then
            echo "⚠️  Invalid image format: $image_name (expected repo:tag)"
            echo "FOUND_STATUS=INVALID_FORMAT"
            echo "IMAGE_STATUS=invalid"
            continue
          fi
          
          # Full image reference
          full_image="${acr_name}.azurecr.io/${repo}:${tag}"
          
          echo "Full image: $full_image"
          
          # Check if image exists in ACR
          if az acr repository show-tags \
            --name "$acr_name" \
            --repository "$repo" \
            --query "contains([], '$tag')" \
            --output tsv 2>/dev/null | grep -q "true"; then
            
            # Alternative method: Try to get image manifest
            if az acr repository show-manifests \
              --name "$acr_name" \
              --repository "$repo" \
              --query "[?tags[?contains(@, '$tag')]]" \
              --output tsv 2>/dev/null | grep -q "$tag"; then
              
              echo "✅ IMAGE FOUND: $full_image"
              echo "FOUND_STATUS=FOUND"
              echo "IMAGE_STATUS=found"
              
              # Get image details
              echo "Image details:"
              az acr repository show \
                --name "$acr_name" \
                --repository "$repo" \
                --query "[?tags[?contains(@, '$tag')]]" \
                --output table 2>/dev/null || true
            else
              echo "❌ IMAGE NOT FOUND: $full_image"
              echo "FOUND_STATUS=NOT_FOUND"
              echo "IMAGE_STATUS=not_found"
            fi
          else
            echo "❌ IMAGE NOT FOUND: $full_image"
            echo "FOUND_STATUS=NOT_FOUND"
            echo "IMAGE_STATUS=not_found"
            
            # Check if repository exists at all
            if az acr repository show --name "$acr_name" --repository "$repo" &>/dev/null; then
              echo "Repository '$repo' exists but tag '$tag' not found"
              echo "Available tags for this repository:"
              az acr repository show-tags \
                --name "$acr_name" \
                --repository "$repo" \
                --output table || true
            else
              echo "Repository '$repo' does not exist in ACR"
            fi
          fi
          
          echo ""
          
          # Set pipeline variable for this image (optional)
          echo "##vso[task.setvariable variable=IMAGE_${repo//[-\/]/_}_STATUS]${FOUND_STATUS}"
        done
        
        echo "=========================================="
        echo "Image check completed"
        echo "=========================================="

  - script: |
      echo "Image check completed. Check the logs above for details."
      echo "You can also use the following variables in subsequent steps:"
      env | grep "IMAGE_.*_STATUS" || echo "No image status variables set"
    displayName: 'Display check results'