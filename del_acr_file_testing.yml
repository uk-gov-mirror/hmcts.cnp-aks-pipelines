trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: AzureCLI@2
  displayName: "Find del.txt and delete ACR images"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -euo pipefail

      echo "Searching for del.txt in repo..."
      FILE=$(find "$(System.DefaultWorkingDirectory)" -type f -name "del.txt" | head -n 1)

      if [ -z "$FILE" ]; then
        echo "No del.txt file found in the repo. Nothing to delete."
        exit 0
      fi

      echo "Found file: $FILE"
      echo ""

      # Read tab-separated file, skip header
      tail -n +2 "$FILE" | while IFS=$'\t' read -r ACR_NAME IMAGE_NAME; do

        # Skip blank lines
        if [ -z "${ACR_NAME:-}" ] || [ -z "${IMAGE_NAME:-}" ]; then
          continue
        fi

        echo "----------------------------------------"
        echo "ACR Name   : $ACR_NAME"
        echo "Image/Tag  : $IMAGE_NAME"

        # Split repo and tag
        REPO="${IMAGE_NAME%%:*}"
        TAG="${IMAGE_NAME##*:}"

        echo "Repository : $REPO"
        echo "Tag        : $TAG"
        echo ""

        echo "Checking if tag exists in ACR..."

        if az acr repository show-tags \
          --name "$ACR_NAME" \
          --repository "$REPO" \
          --output tsv | grep -Fxq "$TAG"; then

          echo "Tag found. Deleting..."

          az acr repository delete \
            --name "$ACR_NAME" \
            --image "$IMAGE_NAME" \
            --yes

          echo "Deleted successfully: $ACR_NAME / $IMAGE_NAME"
        else
          echo "Tag NOT found in ACR: $ACR_NAME / $IMAGE_NAME"
          echo "Available similar tags:"
          az acr repository show-tags \
            --name "$ACR_NAME" \
            --repository "$REPO" \
            --output table | grep "pr-46" || true
        fi

        echo ""
      done

      echo "ACR cleanup completed."