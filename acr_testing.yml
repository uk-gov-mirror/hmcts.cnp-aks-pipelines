trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: AzureCLI@2
  displayName: "Find ACR tags and deletion candidates"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -euo pipefail

      ACR_NAME="hmctsprod"
      OUTPUT_DIR="$(Build.SourcesDirectory)/acr-reports"
      REPORT_FILE="$OUTPUT_DIR/acr-tag-report.csv"
      DELETE_FILE="$OUTPUT_DIR/acr-delete-tags.csv"

      mkdir -p "$OUTPUT_DIR"

      echo "acr_name,filename,date" > "$REPORT_FILE"
      echo "acr_name,filename,date" > "$DELETE_FILE"

      NOW_EPOCH=$(date -u +%s)

      echo "Scanning ACR: $ACR_NAME"
      echo "Report CSV: $REPORT_FILE"
      echo "Delete CSV: $DELETE_FILE"
      echo ""

      repos=$(az acr repository list --name "$ACR_NAME" -o tsv)

      for repo in $repos; do
        echo "Checking repository: $repo"

        # Get tags with timestamps sorted newest first
        az acr repository show-tags \
          --name "$ACR_NAME" \
          --repository "$repo" \
          --detail \
          --orderby time_desc \
          --output json > tags.json

        # ---------- Rule 1: prod ----------
        mapfile -t prod_matches < <(jq -r '.[] | select(.name | test("^prod")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        for i in "${!prod_matches[@]}"; do
          tag_name=$(echo "${prod_matches[$i]}" | cut -d',' -f1)
          tag_date=$(echo "${prod_matches[$i]}" | cut -d',' -f2)
          echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$REPORT_FILE"

          if [[ $i -ge 5 ]]; then
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 5 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$DELETE_FILE"
            fi
          fi
        done

        # ---------- Rule 2: staging ----------
        mapfile -t staging_matches < <(jq -r '.[] | select(.name | test("^staging-")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        for i in "${!staging_matches[@]}"; do
          tag_name=$(echo "${staging_matches[$i]}" | cut -d',' -f1)
          tag_date=$(echo "${staging_matches[$i]}" | cut -d',' -f2)
          echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$REPORT_FILE"

          if [[ $i -ge 2 ]]; then
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 2 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$DELETE_FILE"
            fi
          fi
        done

        # ---------- Rule 3: pr- ----------
        mapfile -t pr_matches < <(jq -r '.[] | select(.name | test("^pr-")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        for i in "${!pr_matches[@]}"; do
          tag_name=$(echo "${pr_matches[$i]}" | cut -d',' -f1)
          tag_date=$(echo "${pr_matches[$i]}" | cut -d',' -f2)
          echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$REPORT_FILE"

          # Only save to delete CSV if more than 1 pr- tag exists and beyond the newest 1
          if [[ ${#pr_matches[@]} -gt 1 && $i -ge 1 ]]; then
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 14 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$DELETE_FILE"
            fi
          fi
        done

        # ---------- Rule 4: labs ----------
        if [[ "$repo" =~ ^labs/.* ]]; then
          mapfile -t labs_matches < <(jq -r '.[] | "\(.name),\(.lastUpdateTime)"' tags.json)
          for entry in "${labs_matches[@]}"; do
            tag_name=$(echo "$entry" | cut -d',' -f1)
            tag_date=$(echo "$entry" | cut -d',' -f2)
            echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$REPORT_FILE"

            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 14 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$DELETE_FILE"
            fi
          done
        fi

        rm -f tags.json
      done

      echo ""
      echo "Generated files:"
      ls -l "$OUTPUT_DIR"
      echo ""
      echo "Report CSV generated:"
      cat "$REPORT_FILE"
      echo ""
      echo "Delete candidates CSV generated:"
      cat "$DELETE_FILE"

- task: PublishPipelineArtifact@1
  displayName: "Publish ACR CSV reports"
  inputs:
    targetPath: '$(Build.SourcesDirectory)/acr-reports'
    artifact: 'acr-csv-reports'
    publishLocation: 'pipeline'