trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: AzureCLI@2
  displayName: "Find ACR tags matching retention rules and export CSV"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -euo pipefail

      ACR_NAME="hmctsprod"
      OUTPUT_FILE="acr_old_tags.csv"

      echo "acr_name,filename,date" > "$OUTPUT_FILE"

      NOW_EPOCH=$(date -u +%s)

      echo "Scanning ACR: $ACR_NAME"
      echo "Output file: $OUTPUT_FILE"
      echo ""

      repos=$(az acr repository list --name "$ACR_NAME" -o tsv)

      for repo in $repos; do
        echo "Checking repository: $repo"

        # Get tags with timestamps sorted newest first
        az acr repository show-tags \
          --name "$ACR_NAME" \
          --repository "$repo" \
          --detail \
          --orderby time_desc \
          --output json > tags.json

        # ---------- Rule 1: prod ----------
        mapfile -t prod_matches < <(jq -r '.[] | select(.name | test("^prod")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        if [[ ${#prod_matches[@]} -gt 5 ]]; then
          for entry in "${prod_matches[@]:5}"; do
            tag_name=$(echo "$entry" | cut -d',' -f1)
            tag_date=$(echo "$entry" | cut -d',' -f2)
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 5 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$OUTPUT_FILE"
            fi
          done
        fi

        # ---------- Rule 2: staging ----------
        mapfile -t staging_matches < <(jq -r '.[] | select(.name | test("^staging-")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        if [[ ${#staging_matches[@]} -gt 2 ]]; then
          for entry in "${staging_matches[@]:2}"; do
            tag_name=$(echo "$entry" | cut -d',' -f1)
            tag_date=$(echo "$entry" | cut -d',' -f2)
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 2 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$OUTPUT_FILE"
            fi
          done
        fi

        # ---------- Rule 3: pr- ----------
        mapfile -t pr_matches < <(jq -r '.[] | select(.name | test("^pr-")) | "\(.name),\(.lastUpdateTime)"' tags.json)
        if [[ ${#pr_matches[@]} -gt 1 ]]; then
          # Only save tags beyond the newest 1
          for entry in "${pr_matches[@]:1}"; do
            tag_name=$(echo "$entry" | cut -d',' -f1)
            tag_date=$(echo "$entry" | cut -d',' -f2)
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 14 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$OUTPUT_FILE"
            fi
          done
        fi
        # If only 1 pr- tag, do nothing (skip) — meets your requirement

        # ---------- Rule 4: labs ----------
        if [[ "$repo" =~ ^labs/.* ]]; then
          mapfile -t labs_matches < <(jq -r '.[] | "\(.name),\(.lastUpdateTime)"' tags.json)
          for entry in "${labs_matches[@]}"; do
            tag_name=$(echo "$entry" | cut -d',' -f1)
            tag_date=$(echo "$entry" | cut -d',' -f2)
            tag_epoch=$(date -u -d "$tag_date" +%s)
            age_days=$(( (NOW_EPOCH - tag_epoch) / 86400 ))
            if [[ $age_days -gt 14 ]]; then
              echo "$ACR_NAME,$repo:$tag_name,$tag_date" >> "$OUTPUT_FILE"
            fi
          done
        fi

        rm -f tags.json
      done

      echo ""
      echo "CSV generated:"
      cat "$OUTPUT_FILE"

- task: PublishPipelineArtifact@1
  displayName: "Publish CSV report"
  inputs:
    targetPath: "acr_old_tags.csv"
    artifact: "acr-tag-report"
    publishLocation: "pipeline"