pool:
  vmImage: 'ubuntu-latest'

steps:
- task: AzureCLI@2
  displayName: "List ACR repositories - hmctsprod"
  inputs:
    azureSubscription: "azurerm-prod"
    scriptType: "bash"
    scriptLocation: "inlineScript"
    inlineScript: |
      set -e

      ACR_NAME="hmctsprod"

      echo "Listing repositories in ACR: $ACR_NAME"
      az acr repository list --name $ACR_NAME --output table
